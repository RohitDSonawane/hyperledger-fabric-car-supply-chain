global:
  scrape_interval: 1s
  evaluation_interval: 1s

scrape_configs:
  - job_name: 'fabric_metrics'
    static_configs:
      - targets:
        - 'orderer.example.com:9443'
        - 'peer0.manufacturer.example.com:9444'
        - 'peer0.showroom.example.com:9445'

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
